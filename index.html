<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Grocery" />
  <meta name="description" content="Personal grocery shopping list app" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Grocery List</title>
  <style>
    :root {
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #0F6E56;
      --green-border: #5DCAA5;
      --bg: #F5F5F0;
      --surface: #FFFFFF;
      --surface2: #F1F0EA;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1A1A1A;
      --text2: #6B6B6B;
      --text3: #A0A0A0;
      --radius: 12px;
      --radius-sm: 8px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111210;
        --surface: #1E1F1C;
        --surface2: #2A2B27;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --text: #F0EFE8;
        --text2: #9A9A8E;
        --text3: #5A5A52;
        --green-light: #0D3D2C;
        --green-border: #1D6B52;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    #app { height: 100%; display: flex; flex-direction: column; }

    /* Header */
    .hdr {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: calc(var(--safe-top) + 12px) 16px 0;
      flex-shrink: 0;
    }
    .hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .app-title { font-size: 18px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .app-title svg { color: var(--green); }
    .item-count { font-size: 12px; color: var(--text2); }

    /* Tabs */
    .tabs { display: flex; }
    .tab { flex: 1; padding: 9px 0; font-size: 13px; font-weight: 400; border: none; background: none; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .tab.active { color: var(--text); border-bottom: 2px solid var(--green); font-weight: 600; }
    .badge { background: var(--green); color: #fff; font-size: 11px; border-radius: 999px; padding: 1px 6px; line-height: 1.4; }
    .badge.gray { background: var(--surface2); color: var(--text2); }

    /* Sort bar */
    .sort-bar { display: flex; align-items: center; gap: 8px; padding: 9px 16px; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .sort-lbl { font-size: 12px; color: var(--text2); }
    .sort-btn { font-size: 12px; padding: 3px 10px; border-radius: 999px; border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2); transition: all .15s; }
    .sort-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    /* Scrollable list */
    .list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; padding-bottom: calc(80px + var(--safe-bottom)); }

    /* Section heading */
    .sec-hd { font-size: 11px; font-weight: 600; color: var(--text2); padding: 8px 0 3px; text-transform: uppercase; letter-spacing: .06em; }

    /* Item card */
    .icard { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 11px 12px; display: flex; align-items: center; gap: 10px; transition: opacity .2s; }
    .icard.dim { opacity: .55; }
    .cdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .iinfo { flex: 1; min-width: 0; }
    .iname { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .iname.crossed { text-decoration: line-through; color: var(--text3); }
    .imeta { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .qty-pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 0.5px solid var(--green-border); background: var(--green-light); color: var(--green-dark); cursor: pointer; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 4px; font-weight: 500; }
    .buy-btn { font-size: 12px; padding: 5px 11px; border-radius: 999px; border: 0.5px solid; cursor: pointer; white-space: nowrap; font-weight: 600; flex-shrink: 0; transition: all .15s; }
    .buy-btn.tobuy { background: var(--green-light); color: var(--green-dark); border-color: var(--green-border); }
    .buy-btn.bought { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; display: flex; align-items: center; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 24px; color: var(--text2); font-size: 14px; line-height: 1.6; }
    .empty svg { opacity: .25; margin-bottom: 12px; }

    /* FAB */
    .fab { position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--green); color: #fff; font-size: 28px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; box-shadow: 0 2px 12px rgba(29,158,117,.35); transition: transform .1s; }
    .fab:active { transform: scale(.93); }

    /* Bottom sheet overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; display: flex; align-items: flex-end; animation: fadeIn .15s; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px calc(24px + var(--safe-bottom)); width: 100%; max-height: 92vh; overflow-y: auto; animation: slideUp .2s ease-out; }
    @keyframes slideUp { from { transform: translateY(60px); opacity:0 } to { transform: translateY(0); opacity:1 } }
    .sheet-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
    .sh-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

    /* Form elements */
    .fld { margin-bottom: 14px; }
    .flbl { font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
    .finp, .fsel { width: 100%; padding: 10px 12px; font-size: 15px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); outline: none; -webkit-appearance: none; }
    .finp:focus, .fsel:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(29,158,117,.15); }

    /* Quantity chip grid */
    .chip-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .chip { padding: 10px 8px; text-align: center; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; background: none; color: var(--text2); transition: all .12s; font-weight: 500; }
    .chip.sel { background: var(--green); color: #fff; border-color: var(--green); }
    .chip.custom-sel { background: var(--green-light); color: var(--green-dark); border-color: var(--green-border); }
    .custom-inp-row { display: flex; gap: 8px; margin-top: 10px; }
    .custom-inp-row .finp { flex: 1; }

    /* Modal actions */
    .mactions { display: flex; gap: 8px; margin-top: 20px; }
    .bcnl { flex: 1; padding: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 14px; color: var(--text2); font-weight: 500; }
    .badd { flex: 2; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--green); color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; }

    /* Settings */
    .settings-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 16px calc(40px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 14px; }
    .scard { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .scard-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .stag { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; border: 0.5px solid var(--border2); font-size: 13px; color: var(--text); background: var(--surface2); }
    .stag-x { background: none; border: none; cursor: pointer; color: var(--text3); padding: 0; display: flex; align-items: center; }
    .add-row { display: flex; gap: 8px; }
    .add-row .finp { flex: 1; }
    .abtn { padding: 10px 16px; border: none; border-radius: var(--radius-sm); background: var(--green); color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .cdot-pick { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: transform .1s; }
    .cdot-pick.sel { border-color: var(--text); transform: scale(1.15); }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const SK = 'gapp_pwa_v1';
const DEFAULT_CATS = [
  {name:'Vegetables',color:'#1D9E75'},{name:'Fruits',color:'#D4537E'},
  {name:'Dairy',color:'#378ADD'},{name:'Grains',color:'#BA7517'},
  {name:'Meat',color:'#D85A30'},{name:'Snacks',color:'#7F77DD'},
  {name:'Beverages',color:'#5DCAA5'},{name:'Cleaning',color:'#888780'},
  {name:'Other',color:'#888780'}
];
const DEFAULT_QTYS = ['100 gm','200 gm','500 gm','1 kg','2 kg','5 kg'];
const PALETTE = ['#1D9E75','#D4537E','#378ADD','#BA7517','#D85A30','#7F77DD','#E24B4A','#639922','#888780','#5DCAA5'];

function loadState() {
  try { const d = JSON.parse(localStorage.getItem(SK)); if(d) return d; } catch(e) {}
  return { items: [], categories: [...DEFAULT_CATS], qtys: [...DEFAULT_QTYS] };
}
function save(s) { localStorage.setItem(SK, JSON.stringify(s)); }

let S = loadState();
let tab = 'buy';
let sort = 'category';
let showAdd = false;
let showQtySheet = false;
let qtyTarget = null;
let newCatName = '', newCatColor = PALETTE[0], newQty = '';
let addForm = { name:'', cat:'', qty:'', customQty:'' };

function catColor(name) { const c = S.categories.find(c=>c.name===name); return c ? c.color : '#888780'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function getSorted(items) {
  const l = [...items];
  if(sort==='category') l.sort((a,b)=>a.category.localeCompare(b.category));
  else if(sort==='name') l.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='status') l.sort((a,b)=>a.bought===b.bought?0:a.bought?1:-1);
  return l;
}

const cartIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`;
const settingsIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
const trashIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
const weightIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12l3 7H3z"/><path d="M3 9l3 13h12l3-13"/><path d="M12 6v3"/></svg>`;
const checkIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const bagIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`;
const xIcon = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const tagIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`;
const rulerIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 8.7l-9 9a1 1 0 0 1-1.4 0l-5.6-5.6a1 1 0 0 1 0-1.4l9-9a1 1 0 0 1 1.4 0l5.6 5.6a1 1 0 0 1 0 1.4z"/><path d="M7.9 13.1l1.4-1.4"/><path d="M10.7 10.3l1.4-1.4"/><path d="M13.5 7.5l1.4-1.4"/></svg>`;
const plusIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const emptyCartIcon = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`;
const checksIcon = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 8 16 20 6"/><polyline points="4 18 8 22 20 10"/></svg>`;

function itemCard(i) {
  const bought = i.bought;
  return `<div class="icard${bought?' dim':''}">
    <div class="cdot" style="background:${catColor(i.category)}"></div>
    <div class="iinfo">
      <div class="iname${bought?' crossed':''}">${esc(i.name)}</div>
      <div class="imeta">${esc(i.category)}</div>
    </div>
    <button class="qty-pill" onclick="openQtySheet('${i.id}')" aria-label="Change quantity">
      ${weightIcon} ${esc(i.qty)}
    </button>
    <button class="buy-btn ${bought?'bought':'tobuy'}" onclick="toggleBought('${i.id}')">
      ${bought ? checkIcon+' Bought' : bagIcon+' Buy'}
    </button>
    <button class="del-btn" onclick="delItem('${i.id}')" aria-label="Delete item">${trashIcon}</button>
  </div>`;
}

function renderBuyList() {
  const items = getSorted(S.items.filter(i=>!i.bought));
  if(!items.length) return `<div class="empty">${emptyCartIcon}<br>Your list is empty.<br><span style="font-size:12px">Tap + to add items</span></div>`;
  if(sort==='category') {
    const groups = {};
    items.forEach(i => { (groups[i.category]=groups[i.category]||[]).push(i); });
    return Object.keys(groups).sort().map(cat =>
      `<div class="sec-hd">${esc(cat)}</div>${groups[cat].map(itemCard).join('')}`
    ).join('');
  }
  return items.map(itemCard).join('');
}

function renderBoughtList() {
  const items = getSorted(S.items.filter(i=>i.bought));
  if(!items.length) return `<div class="empty">${checksIcon}<br>No bought items yet.<br><span style="font-size:12px">Mark items as bought to see them here</span></div>`;
  return items.map(itemCard).join('');
}

function renderSettings() {
  const catTags = S.categories.map((c,i) =>
    `<span class="stag"><span class="cdot" style="background:${c.color};width:10px;height:10px;flex-shrink:0"></span>${esc(c.name)}<button class="stag-x" onclick="delCat(${i})" aria-label="Remove ${esc(c.name)}">${xIcon}</button></span>`
  ).join('');
  const qtyTags = S.qtys.map((q,i) =>
    `<span class="stag">${esc(q)}<button class="stag-x" onclick="delQty(${i})" aria-label="Remove ${esc(q)}">${xIcon}</button></span>`
  ).join('');
  const colorDots = PALETTE.map(c =>
    `<div class="cdot-pick${newCatColor===c?' sel':''}" style="background:${c}" onclick="setNewCatColor('${c}')" tabindex="0" role="button" aria-label="Select color"></div>`
  ).join('');
  return `<div class="settings-wrap">
    <div class="scard">
      <div class="scard-title">${tagIcon} Categories</div>
      <div class="tag-list">${catTags}</div>
      <div class="color-row">${colorDots}</div>
      <div class="add-row">
        <input class="finp" type="text" id="new-cat" placeholder="New category name" value="${esc(newCatName)}" />
        <button class="abtn" onclick="addCat()">Add</button>
      </div>
    </div>
    <div class="scard">
      <div class="scard-title">${rulerIcon} Quantity options</div>
      <div class="tag-list">${qtyTags}</div>
      <div class="add-row">
        <input class="finp" type="text" id="new-qty" placeholder="e.g. 250 gm, 3 pcs, 1 dozen" value="${esc(newQty)}" />
        <button class="abtn" onclick="addQty()">Add</button>
      </div>
    </div>
  </div>`;
}

function addSheetHTML() {
  if(!showAdd) return '';
  const cats = S.categories;
  const selCat = addForm.cat || (cats[0]&&cats[0].name) || '';
  const isCustom = addForm.qty === '__custom__';
  const chips = S.qtys.map(q =>
    `<button type="button" class="chip${addForm.qty===q?' sel':''}" onclick="selAddQty('${esc(q)}')">${esc(q)}</button>`
  ).join('');
  return `<div class="overlay" id="add-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sh-title">Add grocery item</div>
      <div class="fld">
        <div class="flbl">Item name</div>
        <input class="finp" type="text" id="add-name" value="${esc(addForm.name)}" placeholder="e.g. Tomatoes, Milk, Rice" autocomplete="off" />
      </div>
      <div class="fld">
        <div class="flbl">Category</div>
        <select id="add-cat" class="fsel">
          ${cats.map(c=>`<option value="${esc(c.name)}"${selCat===c.name?' selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="fld">
        <div class="flbl">Quantity — tap a preset or enter custom</div>
        <div class="chip-grid">
          ${chips}
          <button type="button" class="chip${isCustom?' custom-sel':''}" onclick="selAddQty('__custom__')">✏️ Custom</button>
        </div>
        ${isCustom ? `<div class="custom-inp-row"><input class="finp" type="text" id="add-custom" placeholder="e.g. 3 pieces, 750 ml, 1 bunch" value="${esc(addForm.customQty)}" autocomplete="off" /></div>` : ''}
      </div>
      <div class="mactions">
        <button type="button" class="bcnl" onclick="closeAdd()">Cancel</button>
        <button type="button" class="badd" onclick="doAdd()">Add to list</button>
      </div>
    </div>
  </div>`;
}

function qtySheetHTML() {
  if(!showQtySheet) return '';
  const item = S.items.find(i=>i.id===qtyTarget);
  if(!item) return '';
  const chips = S.qtys.map(q =>
    `<button class="chip${item.qty===q?' sel':''}" onclick="setItemQty('${item.id}','${esc(q)}')">${esc(q)}</button>`
  ).join('');
  return `<div class="overlay" id="qty-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sh-title">Quantity for ${esc(item.name)}</div>
      <div class="chip-grid" style="margin-bottom:12px">${chips}</div>
      <div class="flbl">Or enter custom quantity</div>
      <div class="custom-inp-row" style="margin-top:6px">
        <input class="finp" type="text" id="qty-custom" placeholder="e.g. 750 ml, 3 pcs, 1 bunch" autocomplete="off" />
        <button class="abtn" onclick="applyCustomQty('${item.id}')">Set</button>
      </div>
      <button style="width:100%;margin-top:16px;padding:12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:14px;color:var(--text2)" onclick="closeQtySheet()">Cancel</button>
    </div>
  </div>`;
}

function render() {
  const buyCount = S.items.filter(i=>!i.bought).length;
  const boughtCount = S.items.filter(i=>i.bought).length;

  let mainContent = '';
  if(tab==='settings') {
    mainContent = renderSettings();
  } else {
    mainContent = `
      <div class="sort-bar">
        <span class="sort-lbl">Sort:</span>
        <button class="sort-btn${sort==='category'?' active':''}" onclick="setSort('category')">Category</button>
        <button class="sort-btn${sort==='name'?' active':''}" onclick="setSort('name')">Name</button>
        <button class="sort-btn${sort==='status'?' active':''}" onclick="setSort('status')">Status</button>
      </div>
      <div class="list-wrap"><div class="list">${tab==='buy'?renderBuyList():renderBoughtList()}</div></div>
      <button class="fab" onclick="openAdd()" aria-label="Add item">${plusIcon}</button>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-top">
        <span class="app-title">${cartIcon} Grocery List</span>
        <span class="item-count">${S.items.length} item${S.items.length!==1?'s':''}</span>
      </div>
      <div class="tabs">
        <button class="tab${tab==='buy'?' active':''}" onclick="setTab('buy')">
          To Buy <span class="badge">${buyCount}</span>
        </button>
        <button class="tab${tab==='bought'?' active':''}" onclick="setTab('bought')">
          Bought <span class="badge gray">${boughtCount}</span>
        </button>
        <button class="tab${tab==='settings'?' active':''}" onclick="setTab('settings')">
          ${settingsIcon} Settings
        </button>
      </div>
    </div>
    ${mainContent}
    ${addSheetHTML()}
    ${qtySheetHTML()}
  `;

  bindEvents();
}

function bindEvents() {
  const addOv = document.getElementById('add-overlay');
  if(addOv) addOv.addEventListener('click', e => { if(e.target===addOv) closeAdd(); });
  const qtyOv = document.getElementById('qty-overlay');
  if(qtyOv) qtyOv.addEventListener('click', e => { if(e.target===qtyOv) closeQtySheet(); });

  const an = document.getElementById('add-name');
  if(an) { an.addEventListener('input', e => { addForm.name = e.target.value; }); setTimeout(()=>an.focus(), 100); }
  const ac = document.getElementById('add-cat');
  if(ac) ac.addEventListener('change', e => { addForm.cat = e.target.value; });
  const acq = document.getElementById('add-custom');
  if(acq) { acq.addEventListener('input', e => { addForm.customQty = e.target.value; }); setTimeout(()=>acq.focus(), 100); }

  const nc = document.getElementById('new-cat');
  if(nc) { nc.addEventListener('input', e => { newCatName = e.target.value; }); nc.addEventListener('keydown', e => { if(e.key==='Enter') addCat(); }); }
  const nq = document.getElementById('new-qty');
  if(nq) { nq.addEventListener('input', e => { newQty = e.target.value; }); nq.addEventListener('keydown', e => { if(e.key==='Enter') addQty(); }); }

  const qc = document.getElementById('qty-custom');
  if(qc) { setTimeout(()=>qc.focus(), 100); qc.addEventListener('keydown', e => { if(e.key==='Enter' && qtyTarget) applyCustomQty(qtyTarget); }); }
}

window.setTab = t => { tab = t; render(); };
window.setSort = s => { sort = s; render(); };
window.openAdd = () => { showAdd = true; addForm = { name:'', cat: S.categories[0]?.name||'', qty: S.qtys[0]||'', customQty:'' }; render(); };
window.closeAdd = () => { showAdd = false; render(); };
window.selAddQty = q => { addForm.qty = q; render(); };
window.doAdd = () => {
  const nm = document.getElementById('add-name');
  const name = (nm ? nm.value : addForm.name).trim();
  if(!name) { if(nm) { nm.style.borderColor='#E24B4A'; nm.focus(); } return; }
  const cat = document.getElementById('add-cat')?.value || addForm.cat || S.categories[0]?.name || 'Other';
  let qty = addForm.qty === '__custom__'
    ? (document.getElementById('add-custom')?.value || addForm.customQty || '').trim() || '1 pc'
    : addForm.qty || S.qtys[0] || '1 pc';
  S.items.push({ id: uid(), name, category: cat, qty, bought: false });
  save(S); showAdd = false; tab = 'buy'; render();
};
window.toggleBought = id => {
  const item = S.items.find(i=>i.id===id);
  if(!item) return;
  item.bought = !item.bought;
  save(S); render();
};
window.delItem = id => { S.items = S.items.filter(i=>i.id!==id); save(S); render(); };
window.openQtySheet = id => { showQtySheet = true; qtyTarget = id; render(); };
window.closeQtySheet = () => { showQtySheet = false; qtyTarget = null; render(); };
window.setItemQty = (id, qty) => {
  const item = S.items.find(i=>i.id===id);
  if(item) { item.qty = qty; save(S); }
  showQtySheet = false; qtyTarget = null; render();
};
window.applyCustomQty = id => {
  const val = document.getElementById('qty-custom')?.value.trim();
  if(!val) return;
  const item = S.items.find(i=>i.id===id);
  if(item) { item.qty = val; save(S); }
  showQtySheet = false; qtyTarget = null; render();
};
window.addCat = () => {
  const inp = document.getElementById('new-cat');
  const name = (inp ? inp.value : newCatName).trim();
  if(!name || S.categories.find(c=>c.name.toLowerCase()===name.toLowerCase())) return;
  S.categories.push({ name, color: newCatColor });
  newCatName = ''; save(S); render();
};
window.delCat = idx => {
  if(S.categories.length <= 1) return;
  S.categories.splice(idx, 1); save(S); render();
};
window.addQty = () => {
  const inp = document.getElementById('new-qty');
  const val = (inp ? inp.value : newQty).trim();
  if(!val || S.qtys.includes(val)) return;
  S.qtys.push(val); newQty = ''; save(S); render();
};
window.delQty = idx => {
  if(S.qtys.length <= 1) return;
  S.qtys.splice(idx, 1); save(S); render();
};
window.setNewCatColor = c => { newCatColor = c; render(); };

render();

if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
